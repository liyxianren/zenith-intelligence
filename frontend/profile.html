<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenith Intelligence (极智学习) - 个人中心</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/mobile.css">
    <style>
        .profile-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        .profile-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 16px;
            padding: 30px;
            color: white;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: bold;
        }

        .profile-info {
            flex: 1;
        }

        .profile-name {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .profile-level {
            display: inline-block;
            padding: 6px 16px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            font-size: 14px;
            margin-bottom: 15px;
        }

        .profile-bio {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 15px;
        }

        .experience-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 4px;
            overflow: hidden;
        }

        .experience-fill {
            height: 100%;
            background: #FFD700;
            border-radius: 4px;
            transition: width 0.3s;
        }

        .experience-text {
            font-size: 12px;
            margin-top: 5px;
            opacity: 0.9;
        }

        .stats-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: #4CAF50;
        }

        .stat-label {
            font-size: 13px;
            color: #666;
            margin-top: 5px;
        }

        .section {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .achievements-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 15px;
        }

        .achievement-item {
            text-align: center;
            padding: 15px;
            border-radius: 12px;
            background: #f9f9f9;
            transition: transform 0.3s;
        }

        .achievement-item:hover {
            transform: translateY(-3px);
        }

        .achievement-item.locked {
            opacity: 0.5;
            filter: grayscale(1);
        }

        .achievement-icon {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .achievement-name {
            font-size: 12px;
            font-weight: 500;
            color: #333;
        }

        .achievement-points {
            font-size: 11px;
            color: #888;
            margin-top: 3px;
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 8px;
        }

        .history-question {
            flex: 1;
            font-size: 14px;
            color: #333;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-right: 15px;
        }

        .history-date {
            font-size: 12px;
            color: #888;
        }

        .view-all-btn {
            padding: 10px 20px;
            background: #f5f5f5;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            color: #666;
        }

        .view-all-btn:hover {
            background: #e0e0e0;
        }

        .nav-links {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .nav-link {
            padding: 10px 20px;
            text-decoration: none;
            color: #666;
            border-radius: 8px;
            transition: background 0.3s;
        }

        .nav-link:hover {
            background: #f5f5f5;
        }

        .nav-link.active {
            background: #4CAF50;
            color: white;
        }

        .logout-btn {
            padding: 10px 20px;
            background: #f44336;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }

        .logout-btn:hover {
            background: #d32f2f;
        }

        .settings-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .form-label {
            font-size: 14px;
            font-weight: 500;
            color: #333;
        }

        .form-input {
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }

        .form-textarea {
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            min-height: 80px;
            resize: vertical;
        }

        .save-btn {
            padding: 12px 24px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            align-self: flex-start;
        }

        .save-btn:hover {
            background: #45a049;
        }
    </style>
</head>

<body>
    <div class="profile-container">
        <!-- 导航菜单 -->
        <nav class="nav-menu">
            <div class="nav-container">
                <a href="app.html" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 18" />
                        <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 6" />
                        <path d="M3 12h18" />
                    </svg>
                    智能解题
                </a>
                <a href="courses.html" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 10v6M2 10l10-5 10 5-10 5z" />
                        <path d="M6 12v5c3 3 9 3 12 0v-5" />
                    </svg>
                    课程中心
                </a>
                <a href="programming.html" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="16 18 22 12 16 6" />
                        <polyline points="8 6 2 12 8 18" />
                    </svg>
                    编程助手
                </a>
                <a href="stats.html" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="20" x2="18" y2="10" />
                        <line x1="12" y1="20" x2="12" y2="4" />
                        <line x1="6" y1="20" x2="6" y2="14" />
                    </svg>
                    学习统计
                </a>
                <a href="profile.html" class="nav-item active">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                        <circle cx="12" cy="7" r="4" />
                    </svg>
                    个人中心
                </a>
            </div>
        </nav>

        <div class="profile-header">
            <div class="profile-avatar" id="profile-avatar">U</div>
            <div class="profile-info">
                <div class="profile-name" id="profile-name">用户名</div>
                <div class="profile-level" id="profile-level">Lv.1 初学者</div>
                <div class="profile-bio" id="profile-bio">这个人很懒，什么都没写...</div>
                <div class="experience-bar">
                    <div class="experience-fill" id="experience-fill" style="width: 0%"></div>
                </div>
                <div class="experience-text" id="experience-text">经验值: 0 / 100</div>
            </div>
            <button class="logout-btn" id="logout-btn">退出登录</button>
        </div>

        <div class="stats-cards" id="stats-cards">
            <!-- 统计卡片将在这里动态生成 -->
        </div>

        <div class="section">
            <div class="section-title">
                <span>我的成就</span>
                <span id="achievement-count">0 / 0</span>
            </div>
            <div class="achievements-grid" id="achievements-grid">
                <!-- 成就将在这里动态生成 -->
            </div>
        </div>

        <div class="section">
            <div class="section-title">
                <span>最近答题</span>
                <button class="view-all-btn" onclick="location.href='app.html'">查看全部</button>
            </div>
            <div class="history-list" id="history-list">
                <!-- 历史记录将在这里动态生成 -->
            </div>
        </div>

        <div class="section">
            <div class="section-title">个人设置</div>
            <form class="settings-form" id="settings-form">
                <div class="form-group">
                    <label class="form-label">个人简介</label>
                    <textarea class="form-textarea" id="bio-input" placeholder="介绍一下自己吧..."></textarea>
                </div>
                <button type="submit" class="save-btn">保存设置</button>
            </form>
        </div>
    </div>

    <script src="js/user.js?v=4"></script>
    <script>
        const ProfileApp = {
            user: null,
            achievements: [],
            history: [],

            async init() {
                await this.loadUserInfo();
                await this.loadAchievements();
                await this.loadHistory();
                this.bindEvents();
            },

            async loadUserInfo() {
                try {
                    const response = await UserManager.fetchApi('/api/auth/me', { headers: UserManager.getHeaders() });
                    const result = await response.json();

                    if (result.success) {
                        this.user = result.data.user;  // API returns result.data.user
                        this.renderUserInfo();
                        this.renderStats();
                    }
                } catch (error) {
                    console.error('加载用户信息失败:', error);
                }
            },

            async loadAchievements() {
                try {
                    const authHeaders = { headers: UserManager.getHeaders() };
                    const userId = this.user?.id || '';
                    const [allResponse, userResponse] = await Promise.all([
                        UserManager.fetchApi('/api/achievement/list', authHeaders),
                        userId ? UserManager.fetchApi(`/api/achievement/user/${userId}`, authHeaders) : Promise.resolve({ json: async () => ({ success: true, data: [] }) })
                    ]);

                    const allResult = await allResponse.json();
                    const userResult = userId ? await userResponse.json() : { success: true, data: [] };

                    if (allResult.success && userResult.success) {
                        const unlockedIds = new Set(userResult.data.map(a => a.achievement.id));
                        this.achievements = allResult.data.map(a => ({
                            ...a,
                            unlocked: unlockedIds.has(a.id)
                        }));
                        this.renderAchievements();
                    }
                } catch (error) {
                    console.error('加载成就失败:', error);
                }
            },

            async loadHistory() {
                try {
                    const response = await UserManager.fetchApi('/api/history?limit=5', { headers: UserManager.getHeaders() });
                    const result = await response.json();

                    if (result.success) {
                        this.history = result.data.records || [];  // API returns result.data.records
                        this.renderHistory();
                    }
                } catch (error) {
                    console.error('加载历史记录失败:', error);
                }
            },

            renderUserInfo() {
                const user = this.user;
                if (!user) return;

                document.getElementById('profile-avatar').textContent = (user.username || '?').charAt(0).toUpperCase();
                document.getElementById('profile-name').textContent = user.username || '未知用户';
                document.getElementById('profile-level').textContent = `Lv.1 初学者`;  // fallback – level not in auth/me
                document.getElementById('profile-bio').textContent = '这个人很懒，什么都没写...';

                document.getElementById('experience-fill').style.width = '0%';
                document.getElementById('experience-text').textContent = `加入于: ${new Date(user.createdAt || Date.now()).toLocaleDateString()}`;

                if (document.getElementById('bio-input')) {
                    document.getElementById('bio-input').value = '';
                }
            },

            renderStats() {
                // The simplified /api/auth/me response doesn't include full stats.
                // Show placeholder until a dedicated stats endpoint is called.
                document.getElementById('stats-cards').innerHTML = `
                    <div class="stat-card">
                        <div class="stat-value">-</div>
                        <div class="stat-label">总题目数</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">-</div>
                        <div class="stat-label">正确题目</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">-</div>
                        <div class="stat-label">正确率</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">-</div>
                        <div class="stat-label">连续学习</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">-</div>
                        <div class="stat-label">学习时长</div>
                    </div>
                `;
            },

            renderAchievements() {
                const container = document.getElementById('achievements-grid');
                const unlockedCount = this.achievements.filter(a => a.unlocked).length;

                document.getElementById('achievement-count').textContent = `${unlockedCount} / ${this.achievements.length}`;

                const icons = {
                    'star': '⭐',
                    'book': '📚',
                    'award': '🏆',
                    'crown': '👑',
                    'gem': '💎',
                    'target': '🎯',
                    'crosshair': '🎯',
                    'check-circle': '✅',
                    'flame': '🔥',
                    'calendar': '📅',
                    'sun': '☀️',
                    'fire': '🔥',
                    'trending-up': '📈',
                    'zap': '⚡',
                    'shield': '🛡️',
                    'clock': '⏰',
                    'watch': '⌚',
                    'hourglass': '⏳',
                    'book-open': '📖',
                    'trophy': '🏆'
                };

                container.innerHTML = this.achievements.map(a => `
                    <div class="achievement-item ${a.unlocked ? '' : 'locked'}">
                        <div class="achievement-icon">${icons[a.icon] || '🏆'}</div>
                        <div class="achievement-name">${a.name}</div>
                        <div class="achievement-points">+${a.points} 经验</div>
                    </div>
                `).join('');
            },

            renderHistory() {
                const container = document.getElementById('history-list');

                if (this.history.length === 0) {
                    container.innerHTML = '<p style="text-align: center; color: #999; padding: 20px;">暂无答题记录</p>';
                    return;
                }

                container.innerHTML = this.history.map(h => `
                    <div class="history-item">
                        <div class="history-question">${h.question}</div>
                        <div class="history-date">${new Date(h.createdAt).toLocaleDateString()}</div>
                    </div>
                `).join('');
            },

            async saveSettings(e) {
                e.preventDefault();

                const bio = document.getElementById('bio-input').value;

                try {
                    const response = await UserManager.fetchApi('/api/auth/profile', {
                        method: 'PUT',
                        headers: UserManager.getHeaders(),
                        body: JSON.stringify({ bio })
                    });

                    const result = await response.json();

                    if (result.success) {
                        alert('设置已保存');
                        document.getElementById('profile-bio').textContent = bio || '这个人很懒，什么都没写...';
                    }
                } catch (error) {
                    console.error('保存设置失败:', error);
                    alert('保存失败，请重试');
                }
            },

            logout() {
                UserManager.logout();
                window.location.href = 'index.html';
            },

            bindEvents() {
                document.getElementById('settings-form').addEventListener('submit', (e) => {
                    this.saveSettings(e);
                });

                document.getElementById('logout-btn').addEventListener('click', () => {
                    this.logout();
                });
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            ProfileApp.init();
        });
    </script>
</body>

</html>
