<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webmaster Dashboard - 网站运营实时监控</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#0f172a',
                        darker: '#0b1120',
                        card: '#1e293b',
                        primary: '#3b82f6',
                        success: '#10b981',
                        warning: '#f59e0b',
                        danger: '#ef4444'
                    }
                }
            }
        }
    </script>
    <!-- ECharts -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: #0b1120;
            color: #f8fafc;
            margin: 0;
            padding: 0;
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 1rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .glass-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.4);
        }

        .gradient-text {
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .metric-value {
            font-weight: 700;
            font-size: 2rem;
            line-height: 1.2;
            margin: 0.5rem 0;
        }

        /* 呼吸灯效果 */
        .pulse-dot {
            width: 8px;
            height: 8px;
            background-color: #10b981;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        /* 滚动条美化 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

        .list-item-enter {
            animation: slideIn 0.3s ease-out forwards;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
    </style>
</head>
<body class="min-h-screen text-slate-200 p-4 md:p-6 lg:p-8">

    <!-- Header -->
    <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
        <div>
            <h1 class="text-3xl font-bold gradient-text">网站运营监控中心</h1>
            <p class="text-slate-400 text-sm mt-1 flex items-center gap-2">
                <span class="pulse-dot"></span> 实时数据分析已连接 · 系统运行良好
            </p>
        </div>
        <div class="flex items-center gap-3">
            <select class="bg-card border border-slate-700 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-primary">
                <option>今天</option>
                <option>昨天</option>
                <option>最近7天</option>
                <option>最近30天</option>
            </select>
            <button class="bg-primary hover:bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors shadow-lg shadow-blue-500/20" onclick="location.reload()">
                强制刷新
            </button>
        </div>
    </header>

    <!-- Metrics Cards -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
        <!-- 访客 -->
        <div class="glass-card p-6">
            <div class="flex justify-between items-start">
                <div class="text-slate-400 text-sm font-medium">今日访客 (UV)</div>
                <div class="p-2 bg-blue-500/10 rounded-lg">
                    <svg class="w-5 h-5 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                </div>
            </div>
            <div class="metric-value font-mono">12,847</div>
            <div class="flex items-center text-sm">
                <span class="text-success flex items-center">
                    <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18"></path></svg>
                    23.5%
                </span>
                <span class="text-slate-500 ml-2">较昨日</span>
            </div>
        </div>

        <!-- 在线 -->
        <div class="glass-card p-6 relative overflow-hidden">
            <div class="absolute inset-0 bg-gradient-to-br from-green-500/5 to-transparent"></div>
            <div class="flex justify-between items-start relative">
                <div class="text-slate-400 text-sm font-medium">当前在线人数</div>
                <div class="p-2 bg-green-500/10 rounded-lg">
                    <svg class="w-5 h-5 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.121 17.804A13.937 13.937 0 0112 16c2.5 0 4.847.655 6.879 1.804M15 10a3 3 0 11-6 0 3 3 0 016 0zm6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                </div>
            </div>
            <div class="metric-value font-mono text-green-400" id="online-users">342</div>
            <div class="flex items-center text-sm relative">
                <span class="pulse-dot mr-2"></span>
                <span class="text-slate-400">实时数据跳动</span>
            </div>
        </div>

        <!-- PV -->
        <div class="glass-card p-6">
            <div class="flex justify-between items-start">
                <div class="text-slate-400 text-sm font-medium">今日浏览量 (PV)</div>
                <div class="p-2 bg-purple-500/10 rounded-lg">
                    <svg class="w-5 h-5 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                </div>
            </div>
            <div class="metric-value font-mono" id="today-pv">45,231</div>
            <div class="flex items-center text-sm">
                <span class="text-success flex items-center">
                    <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18"></path></svg>
                    15.2%
                </span>
                <span class="text-slate-500 ml-2">整体趋势上升</span>
            </div>
        </div>

        <!-- 平均停留 -->
        <div class="glass-card p-6">
            <div class="flex justify-between items-start">
                <div class="text-slate-400 text-sm font-medium">平均停留时长</div>
                <div class="p-2 bg-orange-500/10 rounded-lg">
                    <svg class="w-5 h-5 text-orange-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                </div>
            </div>
            <div class="metric-value font-mono">4m 32s</div>
            <div class="flex items-center text-sm">
                <span class="text-success flex items-center">
                    <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18"></path></svg>
                    8.7%
                </span>
                <span class="text-slate-500 ml-2">用户粘性提升</span>
            </div>
        </div>
    </div>

    <!-- Charts Row 1 -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-6">
        <!-- 流量趋势 -->
        <div class="glass-card p-6 lg:col-span-2">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-semibold border-l-4 border-primary pl-3">流量趋势分析 (30日)</h3>
                <div class="flex gap-2 text-xs">
                    <button class="px-3 py-1 rounded bg-slate-700 hover:bg-slate-600 transition">7天</button>
                    <button class="px-3 py-1 rounded bg-primary text-white">30天</button>
                    <button class="px-3 py-1 rounded bg-slate-700 hover:bg-slate-600 transition">90天</button>
                </div>
            </div>
            <div id="trendChart" class="w-full h-[350px]"></div>
        </div>

        <!-- 来源分布 -->
        <div class="glass-card p-6">
            <h3 class="text-lg font-semibold border-l-4 border-primary pl-3 mb-4">访客来源渠道</h3>
            <div id="sourceChart" class="w-full h-[350px]"></div>
        </div>
    </div>

    <!-- Charts Row 2 -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <!-- 地域分布 -->
        <div class="glass-card p-6">
            <h3 class="text-lg font-semibold border-l-4 border-primary pl-3 mb-4">地域分布 TOP 10</h3>
            <div id="regionChart" class="w-full h-[350px]"></div>
        </div>

        <!-- 设备与浏览器 -->
        <div class="glass-card p-6">
            <h3 class="text-lg font-semibold border-l-4 border-primary pl-3 mb-4">设备与操作系统终端</h3>
            <div id="deviceChart" class="w-full h-[350px]"></div>
        </div>

        <!-- 实时访客 -->
        <div class="glass-card p-6 flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-semibold border-l-4 border-success pl-3 text-success">实时访客监控</h3>
                <span class="text-xs bg-success/20 text-green-400 px-2 py-1 rounded-full animate-pulse">Live</span>
            </div>
            
            <!-- 表头 -->
            <div class="grid grid-cols-4 text-xs font-medium text-slate-400 border-b border-slate-700 pb-2 mb-2">
                <div>时间/地域</div>
                <div class="col-span-2">访问路径</div>
                <div class="text-right">状态</div>
            </div>
            
            <!-- 列表容器 -->
            <div class="flex-1 overflow-hidden relative">
                <div id="liveFeed" class="absolute inset-0 overflow-y-auto pr-2 space-y-3">
                    <!-- 动态注入数据 -->
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts for Logic & Charts -->
    <script>
        // ECharts 默认主题配置
        const chartTheme = {
            textColor: '#94a3b8',
            splitLineColor: '#1e293b',
            tooltipBg: 'rgba(15, 23, 42, 0.9)'
        };

        // 工具函数：生成日期序列
        function generateDates(days) {
            const arr = [];
            const now = new Date();
            for (let i = days; i >= 0; i--) {
                const d = new Date(now);
                d.setDate(now.getDate() - i);
                arr.push(`${d.getMonth() + 1}-${d.getDate()}`);
            }
            return arr;
        }

        // 1. 流量趋势双曲线图
        function initTrendChart() {
            const chartDom = document.getElementById('trendChart');
            const myChart = echarts.init(chartDom);
            
            const dates = generateDates(29);
            // 模拟真实波动数据，基于设定峰值 3月8日
            const pvData = dates.map(d => {
                let base = 20000 + Math.random() * 10000;
                if(d === '3-8') return 58400; // 峰值
                return Math.round(base);
            });
            const uvData = pvData.map(pv => Math.round(pv * (0.3 + Math.random() * 0.1)));

            const option = {
                tooltip: {
                    trigger: 'axis',
                    backgroundColor: chartTheme.tooltipBg,
                    borderColor: '#334155',
                    textStyle: { color: '#f8fafc' },
                    axisPointer: { type: 'cross', label: { backgroundColor: '#334155' } }
                },
                legend: {
                    data: ['浏览量 (PV)', '独立访客 (UV)'],
                    textStyle: { color: chartTheme.textColor },
                    bottom: 0
                },
                grid: { left: '3%', right: '4%', bottom: '10%', top: '5%', containLabel: true },
                xAxis: [
                    {
                        type: 'category',
                        boundaryGap: false,
                        data: dates,
                        axisLabel: { color: chartTheme.textColor },
                        axisLine: { lineStyle: { color: chartTheme.splitLineColor } }
                    }
                ],
                yAxis: [
                    {
                        type: 'value',
                        axisLabel: { color: chartTheme.textColor },
                        splitLine: { lineStyle: { color: chartTheme.splitLineColor, type: 'dashed' } }
                    }
                ],
                series: [
                    {
                        name: '浏览量 (PV)',
                        type: 'line',
                        smooth: true,
                        symbol: 'none',
                        areaStyle: {
                            opacity: 0.1,
                            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                { offset: 0, color: '#3b82f6' },
                                { offset: 1, color: 'transparent' }
                            ])
                        },
                        itemStyle: { color: '#3b82f6' },
                        data: pvData
                    },
                    {
                        name: '独立访客 (UV)',
                        type: 'line',
                        smooth: true,
                        symbol: 'none',
                        areaStyle: {
                            opacity: 0.1,
                            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                { offset: 0, color: '#10b981' },
                                { offset: 1, color: 'transparent' }
                            ])
                        },
                        itemStyle: { color: '#10b981' },
                        data: uvData
                    }
                ]
            };
            myChart.setOption(option);
            return myChart;
        }

        // 2. 访客来源环形图 (多层级)
        function initSourceChart() {
            const chartDom = document.getElementById('sourceChart');
            const myChart = echarts.init(chartDom);
            
            const option = {
                tooltip: {
                    trigger: 'item',
                    formatter: '{a} <br/>{b}: {c}%',
                    backgroundColor: chartTheme.tooltipBg,
                    borderColor: '#334155',
                    textStyle: { color: '#f8fafc' }
                },
                color: ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#06b6d4'],
                series: [
                    // 内环：大类
                    {
                        name: '来源类别',
                        type: 'pie',
                        selectedMode: 'single',
                        radius: [0, '40%'],
                        label: { position: 'inner', fontSize: 11, color: '#fff' },
                        labelLine: { show: false },
                        data: [
                            { value: 42.3, name: '搜索引擎' },
                            { value: 28.6, name: '直接访问' },
                            { value: 19.4, name: '外部链接' },
                            { value: 9.7, name: '社交媒体' }
                        ]
                    },
                    // 外环：细分
                    {
                        name: '具体来源',
                        type: 'pie',
                        radius: ['55%', '80%'],
                        label: {
                            formatter: '{b|{b}}\n{c|{c}%}',
                            rich: {
                                b: { color: chartTheme.textColor, fontSize: 12, lineHeight: 20 },
                                c: { color: '#f8fafc', fontSize: 12, fontWeight: 'bold' }
                            }
                        },
                        data: [
                            { value: 18.5, name: '百度' },
                            { value: 12.7, name: '谷歌' },
                            { value: 8.2, name: '必应' },
                            { value: 2.9, name: '其他搜索' },
                            { value: 28.6, name: '直接输入' },
                            { value: 8.2, name: '知乎' },
                            { value: 6.1, name: '微博' },
                            { value: 3.5, name: 'GitHub' },
                            { value: 1.6, name: '其他外链' },
                            { value: 5.3, name: '微信' },
                            { value: 2.8, name: '抖音' },
                            { value: 1.6, name: '小红书' }
                        ]
                    }
                ]
            };
            myChart.setOption(option);
            return myChart;
        }

        // 3. 地域分布条形图
        function initRegionChart() {
            const chartDom = document.getElementById('regionChart');
            const myChart = echarts.init(chartDom);
            
            const option = {
                tooltip: {
                    trigger: 'axis',
                    axisPointer: { type: 'shadow' },
                    backgroundColor: chartTheme.tooltipBg,
                    borderColor: '#334155',
                    textStyle: { color: '#f8fafc' }
                },
                grid: { left: '3%', right: '4%', bottom: '3%', top: '0', containLabel: true },
                xAxis: {
                    type: 'value',
                    show: false
                },
                yAxis: {
                    type: 'category',
                    inverse: true, // 排名从上到下
                    data: ['广东', '北京', '上海', '浙江', '江苏', '四川', '湖北', '山东', '福建', '陕西'],
                    axisLabel: { color: chartTheme.textColor },
                    axisLine: { show: false },
                    axisTick: { show: false }
                },
                series: [
                    {
                        name: '访问人数',
                        type: 'bar',
                        data: [2341, 1876, 1654, 1432, 1098, 876, 743, 654, 521, 398],
                        itemStyle: {
                            color: new echarts.graphic.LinearGradient(1, 0, 0, 0, [
                                { offset: 0, color: '#3b82f6' },
                                { offset: 1, color: 'rgba(59, 130, 246, 0.2)' }
                            ]),
                            borderRadius: [0, 4, 4, 0]
                        },
                        barWidth: '50%',
                        label: {
                            show: true,
                            position: 'right',
                            valueAnimation: true,
                            color: '#f8fafc',
                            formatter: '{c}人'
                        }
                    }
                ]
            };
            myChart.setOption(option);
            return myChart;
        }

        // 4. 设备与浏览器 (南丁格尔玫瑰图模拟设备操作系统)
        function initDeviceChart() {
            const chartDom = document.getElementById('deviceChart');
            const myChart = echarts.init(chartDom);
            
            const option = {
                tooltip: {
                    trigger: 'item',
                    formatter: '{b}: {c}%',
                    backgroundColor: chartTheme.tooltipBg,
                    borderColor: '#334155',
                    textStyle: { color: '#f8fafc' }
                },
                legend: {
                    bottom: 0,
                    textStyle: { color: chartTheme.textColor },
                    itemWidth: 10,
                    itemHeight: 10
                },
                series: [
                    {
                        name: '操作系统',
                        type: 'pie',
                        radius: ['20%', '70%'],
                        center: ['50%', '45%'],
                        roseType: 'area',
                        itemStyle: { borderRadius: 4 },
                        label: {
                            color: chartTheme.textColor,
                            formatter: '{b}\n{c}%'
                        },
                        data: [
                            { value: 38.7, name: 'Windows' },
                            { value: 22.4, name: 'iOS' },
                            { value: 18.9, name: 'Android' },
                            { value: 15.6, name: 'macOS' },
                            { value: 4.4, name: '其他' }
                        ].sort((a, b) => a.value - b.value)
                    }
                ]
            };
            myChart.setOption(option);
            return myChart;
        }

        // 响应式调整
        const charts = [];
        window.addEventListener('resize', () => {
            charts.forEach(chart => chart && chart.resize());
        });

        // 5. 实时访客数据动态更新
        const cities = ['上海', '深圳', '杭州', '北京', '广州', '成都', '南京', '武汉'];
        const paths = ['/products/analytics', '/blog/seo-guide', '/', '/about', '/pricing', '/dashboard'];
        const currentPages = ['定价方案', 'SEO指南', '首页', '关于我们', '购买页面', '控制台'];
        
        function addLiveVisitor() {
            const feed = document.getElementById('liveFeed');
            const isBrowsing = Math.random() > 0.3;
            
            const city = cities[Math.floor(Math.random() * cities.length)];
            const pathIdx = Math.floor(Math.random() * paths.length);
            const path = paths[pathIdx];
            const pageName = currentPages[pathIdx];
            
            const statusHtml = isBrowsing 
                ? `<span class="text-xs text-green-400 bg-green-400/10 px-2 py-1 rounded">浏览中</span>`
                : `<span class="text-xs text-slate-400 bg-slate-700/50 px-2 py-1 rounded">已离开</span>`;
                
            const subtext = isBrowsing 
                ? `<span class="text-blue-400 truncate w-full block">当前：${pageName}</span>` 
                : `<span class="text-slate-500 truncate w-full block">停留：${Math.floor(Math.random()*5)+1}分${Math.floor(Math.random()*60)}秒</span>`;

            const item = document.createElement('div');
            item.className = 'grid grid-cols-4 items-center text-sm border-b border-slate-700/50 pb-2 list-item-enter';
            item.innerHTML = `
                <div class="flex flex-col">
                    <span class="text-slate-300">刚刚</span>
                    <span class="text-xs text-slate-500">${city}</span>
                </div>
                <div class="col-span-2 flex flex-col pr-2 overflow-hidden">
                    <span class="text-slate-200 truncate font-mono text-xs">${path}</span>
                    <span class="text-xs">${subtext}</span>
                </div>
                <div class="text-right">
                    ${statusHtml}
                </div>
            `;
            
            feed.insertBefore(item, feed.firstChild);
            
            // 保持列表不超过20个
            if (feed.children.length > 20) {
                feed.removeChild(feed.lastChild);
            }
            
            // 随机更新所有"刚刚"变为"x分钟前"
            const timeElements = feed.querySelectorAll('.text-slate-300');
            timeElements.forEach((el, idx) => {
                if(idx > 0 && Math.random() > 0.5) {
                    let mins = parseInt(el.innerText) || 0;
                    if(el.innerText === '刚刚') mins = 1;
                    else mins++;
                    el.innerText = `${mins}分钟前`;
                }
            });
        }

        // 6. 数字动态跳动模拟
        function animateNumbers() {
            const onlineEl = document.getElementById('online-users');
            const pvEl = document.getElementById('today-pv');
            
            // 在线人数每几秒小幅波动
            setInterval(() => {
                let current = parseInt(onlineEl.innerText);
                let diff = Math.floor(Math.random() * 7) - 3; // -3 到 +3
                onlineEl.innerText = current + diff;
            }, 3000);
            
            // 今日PV不断上涨
            setInterval(() => {
                let current = parseInt(pvEl.innerText.replace(',', ''));
                let add = Math.floor(Math.random() * 5); // 0 到 4
                if(add > 0) {
                    current += add;
                    pvEl.innerText = current.toLocaleString();
                }
            }, 2000);
            
            // 实时访客流插入
            function scheduleNextVisitor() {
                const delay = 3000 + Math.random() * 5000; // 3-8秒
                setTimeout(() => {
                    addLiveVisitor();
                    scheduleNextVisitor();
                }, delay);
            }
            scheduleNextVisitor();
        }

        // 初始化所有图表
        window.onload = () => {
            charts.push(initTrendChart());
            charts.push(initSourceChart());
            charts.push(initRegionChart());
            charts.push(initDeviceChart());
            
            // 初始填充几条记录
            for(let i=0; i<5; i++) {
                addLiveVisitor();
            }
            // 开始动画与模拟
            animateNumbers();
        };

    </script>
</body>
</html>
