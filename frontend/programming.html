<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

    <style>
        .programming-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .programming-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .programming-title {
            font-size: 28px;
            font-weight: bold;
            color: #333;
        }
        
        .language-selector {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .language-select {
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            min-width: 120px;
        }
        
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        .editor-panel, .output-panel {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            background: #f9f9f9;
            border-bottom: 1px solid #eee;
        }
        
        .panel-title {
            font-weight: 600;
            color: #333;
        }
        
        .panel-actions {
            display: flex;
            gap: 10px;
        }
        
        .action-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .action-btn.btn-primary {
            background: #4CAF50;
            color: white;
        }
        
        .action-btn.btn-primary:hover {
            background: #45a049;
        }
        
        .action-btn.btn-secondary {
            background: #f5f5f5;
            color: #666;
        }
        
        .action-btn.btn-secondary:hover {
            background: #e0e0e0;
        }
        
        .code-editor {
            width: 100%;
            height: 400px;
            border: none;
            padding: 15px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 14px;
            line-height: 1.6;
            resize: none;
            outline: none;
        }
        
        .output-tabs {
            display: flex;
            border-bottom: 1px solid #eee;
        }
        
        .output-tab {
            padding: 10px 15px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.3s;
        }
        
        .output-tab:hover {
                background: #f5f5f5;
            }
        
        .output-tab.active {
                border-bottom-color: #4CAF50;
            }
        
        .output-content {
            padding: 15px;
            height: 300px;
            overflow-y: auto;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 13px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .output-content.markdown-mode {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            white-space: normal;
        }

        .markdown-output {
            color: #1f2937;
            line-height: 1.7;
        }

        .markdown-output h1,
        .markdown-output h2,
        .markdown-output h3,
        .markdown-output h4,
        .markdown-output h5,
        .markdown-output h6 {
            margin: 0 0 12px;
            font-weight: 700;
            line-height: 1.4;
        }

        .markdown-output p,
        .markdown-output ul,
        .markdown-output ol,
        .markdown-output blockquote,
        .markdown-output pre {
            margin: 0 0 12px;
        }

        .markdown-output ul,
        .markdown-output ol {
            padding-left: 20px;
        }

        .markdown-output code {
            font-family: 'Consolas', 'Monaco', monospace;
            background: #eef2ff;
            color: #312e81;
            padding: 2px 6px;
            border-radius: 6px;
            font-size: 12px;
        }

        .markdown-output pre {
            background: #0f172a;
            color: #e2e8f0;
            padding: 14px;
            border-radius: 10px;
            overflow-x: auto;
        }

        .markdown-output pre code {
            background: transparent;
            color: inherit;
            padding: 0;
            border-radius: 0;
        }

        .markdown-output blockquote {
            border-left: 4px solid #22c55e;
            padding-left: 12px;
            color: #475569;
        }
        
        .ai-tools {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 10px;
            padding: 15px;
            border-top: 1px solid #eee;
        }
        
        .ai-tool-btn {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s;
        }
        
        .ai-tool-btn:hover {
            border-color: #4CAF50;
            background: #f0f9f0;
        }
        
        .ai-tool-icon {
            font-size: 24px;
            margin-bottom: 5px;
        }
        
        .ai-tool-name {
            font-size: 12px;
            color: #666;
        }
        
        .nav-links {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .nav-link {
            padding: 10px 20px;
            text-decoration: none;
            color: #666;
            border-radius: 8px;
            transition: background 0.3s;
        }
        
        .nav-link:hover {
            background: #f5f5f5;
        }
        
        .nav-link.active {
            background: #4CAF50;
            color: white;
        }
        
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #fff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .error-message {
            color: #f44336;
        }
        
        .success-message {
            color: #4CAF50;
        }
    </style>
</head>

    <script src="js/user.js?v=4"></script>
    <script>
        const ProgrammingApp = {
            code: '',
            output: '',
            language: 'python',
            currentTab: 'output',
            supportedLanguages: ['python', 'c', 'javascript', 'java', 'cpp'],
            indentUnit: '    ',
            
            init() {
                this.bindEvents();
                this.loadSavedCode();
                this.updatePlaceholder();
            },

            getStarterCode(language) {
                const templates = {
                    python: "print('Hello, World!')",
                    c: "#include <stdio.h>\n\nint main() {\n    printf(\"Hello, World!\\n\");\n    return 0;\n}",
                    javascript: "console.log('Hello, World!');",
                    java: "public class Main {\n    public static void main(String[] args) {\n        System.out.println(\"Hello, World!\");\n    }\n}",
                    cpp: "#include <iostream>\n\nint main() {\n    std::cout << \"Hello, World!\" << std::endl;\n    return 0;\n}"
                };

                return templates[language] || templates.python;
            },
            
            bindEvents() {
                const editor = document.getElementById('code-editor');

                document.getElementById('run-btn').addEventListener('click', () => {
                    this.runCode();
                });
                
                document.getElementById('clear-btn').addEventListener('click', () => {
                    this.clearCode();
                });
                
                document.getElementById('language-select').addEventListener('change', (e) => {
                    this.language = e.target.value;
                    this.updatePlaceholder();
                });
                
                editor.addEventListener('input', (e) => {
                    this.code = e.target.value;
                    this.saveCode();
                });

                editor.addEventListener('keydown', (e) => {
                    this.handleEditorKeydown(e);
                });
                
                document.querySelectorAll('.output-tab').forEach(tab => {
                    tab.addEventListener('click', (e) => {
                        this.switchTab(e.target.dataset.tab);
                    });
                });
                
                document.querySelectorAll('.ai-tool-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const tool = e.currentTarget.dataset.tool;
                        this.useAITool(tool);
                    });
                });
            },

            applyEditorIndentation(value, selectionStart, selectionEnd, isOutdent) {
                const indent = this.indentUnit;
                const lineStart = value.lastIndexOf('\n', Math.max(selectionStart - 1, 0)) + 1;
                const hasSelection = selectionStart !== selectionEnd;

                if (!isOutdent && !hasSelection) {
                    return {
                        value: value.slice(0, selectionStart) + indent + value.slice(selectionEnd),
                        selectionStart: selectionStart + indent.length,
                        selectionEnd: selectionStart + indent.length,
                    };
                }

                const block = value.slice(lineStart, selectionEnd);
                const lines = block.split('\n');

                if (!isOutdent) {
                    const updatedBlock = lines.map((line) => indent + line).join('\n');
                    return {
                        value: value.slice(0, lineStart) + updatedBlock + value.slice(selectionEnd),
                        selectionStart: selectionStart + indent.length,
                        selectionEnd: selectionEnd + indent.length * lines.length,
                    };
                }

                let removedFromFirstLine = 0;
                let totalRemoved = 0;
                const updatedLines = lines.map((line, index) => {
                    let removed = 0;
                    let updatedLine = line;

                    if (updatedLine.startsWith(indent)) {
                        updatedLine = updatedLine.slice(indent.length);
                        removed = indent.length;
                    } else if (updatedLine.startsWith('\t')) {
                        updatedLine = updatedLine.slice(1);
                        removed = 1;
                    } else {
                        const leadingSpaces = updatedLine.match(/^ {1,4}/);
                        if (leadingSpaces) {
                            removed = leadingSpaces[0].length;
                            updatedLine = updatedLine.slice(removed);
                        }
                    }

                    if (index === 0) {
                        removedFromFirstLine = removed;
                    }
                    totalRemoved += removed;
                    return updatedLine;
                });

                if (!totalRemoved) {
                    return {
                        value,
                        selectionStart,
                        selectionEnd,
                    };
                }

                const nextSelectionStart = hasSelection
                    ? Math.max(lineStart, selectionStart - removedFromFirstLine)
                    : Math.max(lineStart, selectionStart - removedFromFirstLine);

                return {
                    value: value.slice(0, lineStart) + updatedLines.join('\n') + value.slice(selectionEnd),
                    selectionStart: nextSelectionStart,
                    selectionEnd: Math.max(nextSelectionStart, selectionEnd - totalRemoved),
                };
            },

            handleEditorKeydown(event) {
                if (event.key !== 'Tab') {
                    return;
                }

                event.preventDefault();

                const editor = event.target;
                const nextState = this.applyEditorIndentation(
                    editor.value,
                    editor.selectionStart,
                    editor.selectionEnd,
                    event.shiftKey
                );

                editor.value = nextState.value;
                editor.setSelectionRange(nextState.selectionStart, nextState.selectionEnd);
                this.code = nextState.value;
                this.saveCode();
            },

            escapeHtml(text) {
                return String(text ?? '')
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#39;');
            },

            renderInlineMarkdown(text) {
                let html = this.escapeHtml(text);
                html = html.replace(/`([^`\n]+)`/g, '<code>$1</code>');
                html = html.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
                html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                html = html.replace(/\*([^*\n]+)\*/g, '<em>$1</em>');
                html = html.replace(/~~([^~\n]+)~~/g, '<del>$1</del>');
                return html;
            },

            renderMarkdownBlock(block, codeBlocks) {
                const codeTokenMatch = block.match(/^@@CODE_BLOCK_(\d+)@@$/);
                if (codeTokenMatch) {
                    const codeBlock = codeBlocks[Number(codeTokenMatch[1])];
                    const languageClass = codeBlock.lang ? ` class="language-${this.escapeHtml(codeBlock.lang)}"` : '';
                    return `<pre><code${languageClass}>${codeBlock.code}</code></pre>`;
                }

                const lines = block.split('\n').map((line) => line.replace(/\s+$/, ''));

                if (lines.every((line) => /^[-*+]\s+/.test(line.trim()))) {
                    const items = lines
                        .map((line) => line.trim().replace(/^[-*+]\s+/, ''))
                        .map((item) => `<li>${this.renderInlineMarkdown(item)}</li>`)
                        .join('');
                    return `<ul>${items}</ul>`;
                }

                if (lines.every((line) => /^\d+\.\s+/.test(line.trim()))) {
                    const items = lines
                        .map((line) => line.trim().replace(/^\d+\.\s+/, ''))
                        .map((item) => `<li>${this.renderInlineMarkdown(item)}</li>`)
                        .join('');
                    return `<ol>${items}</ol>`;
                }

                const headingMatch = block.match(/^(#{1,6})\s+(.+)$/);
                if (headingMatch) {
                    const level = headingMatch[1].length;
                    return `<h${level}>${this.renderInlineMarkdown(headingMatch[2])}</h${level}>`;
                }

                if (lines.every((line) => /^>\s?/.test(line.trim()))) {
                    const quote = lines
                        .map((line) => line.trim().replace(/^>\s?/, ''))
                        .map((line) => this.renderInlineMarkdown(line))
                        .join('<br>');
                    return `<blockquote>${quote}</blockquote>`;
                }

                return `<p>${lines.map((line) => this.renderInlineMarkdown(line)).join('<br>')}</p>`;
            },

            renderMarkdown(text) {
                const source = String(text ?? '').replace(/\r\n?/g, '\n').trim();
                if (!source) {
                    return '';
                }

                const codeBlocks = [];
                const withCodeTokens = source.replace(/```([a-zA-Z0-9_-]+)?\n?([\s\S]*?)```/g, (_, lang = '', code = '') => {
                    const token = `@@CODE_BLOCK_${codeBlocks.length}@@`;
                    codeBlocks.push({
                        lang: lang.trim(),
                        code: this.escapeHtml(code.replace(/\n$/, ''))
                    });
                    return token;
                });

                return withCodeTokens
                    .split(/\n{2,}/)
                    .map((block) => this.renderMarkdownBlock(block, codeBlocks))
                    .join('');
            },

            renderPlainOutput(text, type) {
                const outputContent = document.getElementById('output-content');
                outputContent.classList.remove('markdown-mode');
                outputContent.innerHTML = `<span class="${type}-message">${this.escapeHtml(text)}</span>`;
            },

            renderMarkdownOutput(text) {
                const outputContent = document.getElementById('output-content');
                outputContent.classList.add('markdown-mode');
                outputContent.innerHTML = `<div class="markdown-output">${this.renderMarkdown(text)}</div>`;
            },

            formatAIToolOutput(tool, data) {
                if (tool === 'explain') {
                    return data.explanation || '未返回解释内容';
                }
                if (tool === 'review') {
                    return data.review || '未返回审查内容';
                }
                if (tool === 'debug') {
                    return data.debug || '未返回调试内容';
                }
                if (tool === 'optimize') {
                    return `### 优化后的代码\n\n\`\`\`${this.language}\n${data.optimizedCode || ''}\n\`\`\``;
                }
                if (tool === 'test') {
                    return `### 生成的测试代码\n\n\`\`\`${this.language}\n${data.testCode || ''}\n\`\`\``;
                }
                if (tool === 'convert') {
                    return `### 转换后的 ${data.toLanguage} 代码\n\n\`\`\`${data.toLanguage}\n${data.code || ''}\n\`\`\``;
                }
                return '未返回处理结果';
            },
            
            async runCode() {
                const code = document.getElementById('code-editor').value;
                
                if (!code.trim()) {
                    this.showOutput('请输入代码后再运行', 'error');
                    return;
                }
                
                const runBtn = document.getElementById('run-btn');
                runBtn.innerHTML = '<span class="loading"></span> 运行中...';
                runBtn.disabled = true;
                
                try {
                    const response = await UserManager.fetchApi('/api/programming/execute', {
                        method: 'POST',
                        headers: UserManager.getHeaders(),
                        body: JSON.stringify({
                            code: code,
                            language: this.language
                        })
                    });
                    
                    const result = await response.json();
                    
                    if (result.success) {
                        const data = result.data;
                        let output = '';
                        
                        if (data.stdout) {
                            output += data.stdout;
                        }
                        
                        if (data.stderr) {
                            output += '\n[错误输出]\n' + data.stderr;
                        }
                        
                        if (data.returnCode !== 0) {
                            output += `\n[进程退出码: ${data.returnCode}]`;
                        }
                        
                        this.showOutput(output || '程序执行完成，无输出', data.returnCode === 0 ? 'success' : 'error');
                    } else {
                        this.showOutput(result.error, 'error');
                    }
                } catch (error) {
                    this.showOutput('运行失败: ' + error.message, 'error');
                } finally {
                    runBtn.innerHTML = '▶ 运行';
                    runBtn.disabled = false;
                }
            },
            
            async useAITool(tool) {
                const code = document.getElementById('code-editor').value;
                
                if (!code.trim()) {
                    alert('请先输入代码');
                    return;
                }
                
                this.switchTab('ai');
                this.showAIOutput('正在处理中...', 'loading');
                
                const endpoints = {
                    'explain': '/api/programming/explain',
                    'review': '/api/programming/review',
                    'debug': '/api/programming/debug',
                    'optimize': '/api/programming/optimize',
                    'test': '/api/programming/test',
                    'convert': '/api/programming/convert'
                };
                
                const body = {
                    code: code,
                    language: this.language
                };
                
                if (tool === 'debug') {
                    const errorOutput = this.getOutputText();
                    body.errorMessage = errorOutput;
                }

                if (tool === 'convert') {
                    const defaultTarget = this.language === 'python' ? 'javascript' : 'python';
                    const targetLanguage = window.prompt(
                        '请输入目标语言：python / c / javascript / java / cpp',
                        defaultTarget
                    );

                    if (!targetLanguage) {
                        this.showAIOutput('已取消语言转换', 'info');
                        return;
                    }

                    const normalizedTarget = targetLanguage.trim().toLowerCase();
                    if (!this.supportedLanguages.includes(normalizedTarget)) {
                        this.showAIOutput('不支持的目标语言', 'error');
                        return;
                    }

                    if (normalizedTarget === this.language) {
                        this.showAIOutput('目标语言不能与当前语言相同', 'error');
                        return;
                    }

                    body.fromLanguage = this.language;
                    body.toLanguage = normalizedTarget;
                }
                
                try {
                    const response = await UserManager.fetchApi(endpoints[tool], {
                        method: 'POST',
                        headers: UserManager.getHeaders(),
                        body: JSON.stringify(body)
                    });
                    
                    const result = await response.json();
                    
                    if (result.success) {
                        const data = result.data;
                        const output = this.formatAIToolOutput(tool, data);
                        this.showAIOutput(output, 'success');
                    } else {
                        this.showAIOutput(result.error, 'error');
                    }
                } catch (error) {
                    this.showAIOutput('处理失败: ' + error.message, 'error');
                }
            },
            
            getOutputText() {
                const outputContent = document.getElementById('output-content');
                return outputContent.textContent;
            },
            
            showOutput(text, type) {
                this.renderPlainOutput(text, type);
            },
            
            showAIOutput(text, type) {
                const outputContent = document.getElementById('output-content');
                if (type === 'loading') {
                    outputContent.classList.remove('markdown-mode');
                    outputContent.innerHTML = `<span class="loading"></span> ${text}`;
                } else {
                    this.renderMarkdownOutput(text);
                }
            },
            
            switchTab(tab) {
                this.currentTab = tab;
                document.querySelectorAll('.output-tab').forEach(t => {
                    t.classList.remove('active');
                    if (t.dataset.tab === tab) {
                        t.classList.add('active');
                    }
                });
                
                if (tab === 'output') {
                    this.showOutput(this.output || '运行代码后，输出将显示在这里...', 'info');
                } else {
                    this.showAIOutput('选择一个 AI 工具来处理代码', 'info');
                }
            },
            
            clearCode() {
                const starterCode = this.getStarterCode(this.language);
                document.getElementById('code-editor').value = starterCode;
                this.code = starterCode;
                this.saveCode();
                this.showOutput('已载入默认示例代码', 'info');
            },
            
            saveCode() {
                localStorage.setItem('saved_code', this.code);
                localStorage.setItem('saved_language', this.language);
            },
            
            loadSavedCode() {
                const savedCode = localStorage.getItem('saved_code');
                const savedLanguage = localStorage.getItem('saved_language');
                
                if (savedCode) {
                    document.getElementById('code-editor').value = savedCode;
                    this.code = savedCode;
                }
                
                if (savedLanguage && this.supportedLanguages.includes(savedLanguage)) {
                    document.getElementById('language-select').value = savedLanguage;
                    this.language = savedLanguage;
                }

                if (!this.code) {
                    const starterCode = this.getStarterCode(this.language);
                    document.getElementById('code-editor').value = starterCode;
                    this.code = starterCode;
                }
            },
            
            updatePlaceholder() {
                const placeholders = {
                    python: "# 在这里输入你的 Python 代码...\n# 例如:\nprint('Hello, World!')",
                    c: "#include <stdio.h>\n\nint main() {\n    printf(\"Hello, World!\\n\");\n    return 0;\n}",
                    javascript: "// 在这里输入你的 JavaScript 代码...\n// 例如:\nconsole.log('Hello, World!');",
                    java: "public class Main {\n    public static void main(String[] args) {\n        System.out.println(\"Hello, World!\");\n    }\n}",
                    cpp: "#include <iostream>\n\nint main() {\n    std::cout << \"Hello, World!\" << std::endl;\n    return 0;\n}"
                };
                
                document.getElementById('code-editor').placeholder = placeholders[this.language];
            }
        };
        
        document.addEventListener('DOMContentLoaded', () => {
            ProgrammingApp.init();
        });
    </script>
</body>
</html>
