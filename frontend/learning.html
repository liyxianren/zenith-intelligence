<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenith Intelligence (极智学习) - 学习界面</title>
    <!-- Tailwind CSS with custom directives processing -->
    <link rel="stylesheet" href="css/style.css">

    <!-- CodeMirror for Code Editing -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/dracula.min.css">

    <!-- Highlight.js for Markdown Blocks -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/atom-one-dark.min.css">

    <style>
        :root {
            --primary: #4CAF50;
            --primary-hover: #45a049;
            --bg-color: #f5f5f5;
            --card-bg: white;
            --text-main: #333;
            --text-secondary: #666;
            --border-color: #e0e0e0;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #121212;
                --card-bg: #1e1e1e;
                --text-main: #e0e0e0;
                --text-secondary: #aaaaaa;
                --border-color: #333;
                --primary: #388E3C;
                --primary-hover: #2E7D32;
            }
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Top Navigation Header */
        .header {
            height: 60px;
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 20px;
            flex-shrink: 0;
        }

        .back-nav {
            display: flex;
            align-items: center;
            text-decoration: none;
            color: var(--text-main);
            font-size: 14px;
            font-weight: 500;
        }

        .back-nav:hover {
            color: var(--primary);
        }

        .course-title {
            font-weight: bold;
            font-size: 18px;
            margin-left: 20px;
            border-left: 1px solid var(--border-color);
            padding-left: 20px;
        }

        /* Split Pane Layout */
        .workspace {
            display: flex;
            flex: 1;
            height: calc(100vh - 60px);
            overflow: hidden;
        }

        .left-menu {
            width: 250px;
            background-color: var(--card-bg);
            border-right: 1px solid var(--border-color);
            overflow-y: auto;
            flex-shrink: 0;
        }

        .menu-chapter {
            padding: 15px;
            font-weight: bold;
            font-size: 14px;
            border-bottom: 1px solid var(--border-color);
            background-color: rgba(0, 0, 0, 0.02);
        }

        .menu-lesson {
            padding: 12px 15px 12px 25px;
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
            border-bottom: 1px solid var(--border-color);
            transition: background 0.2s;
        }

        .menu-lesson:hover {
            background-color: rgba(76, 175, 80, 0.1);
        }

        .menu-lesson.active {
            color: var(--primary);
            font-weight: 500;
            background-color: rgba(76, 175, 80, 0.05);
            border-left: 3px solid var(--primary);
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            background-color: var(--card-bg);
            overflow-y: auto;
            padding: 40px;
            line-height: 1.6;
            margin: 0 10px;
        }

        /* Markdown Document Styles */
        .markdown-content {
            color: var(--text-main);
        }

        .markdown-content h1 {
            font-size: 2em;
            margin: 0 0 0.75em;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        .markdown-content h2 {
            font-size: 1.5em;
            margin-top: 1.5em;
            margin-bottom: 0.5em;
        }

        .markdown-content h3,
        .markdown-content h4,
        .markdown-content h5,
        .markdown-content h6 {
            margin: 1.2em 0 0.5em;
            line-height: 1.4;
        }

        .markdown-content p {
            margin-bottom: 1em;
        }

        .markdown-content ul,
        .markdown-content ol {
            margin: 0 0 1em;
            padding-left: 1.5em;
        }

        .markdown-content li + li {
            margin-top: 0.35em;
        }

        .markdown-content code {
            padding: 0.12em 0.35em;
            border-radius: 6px;
            background: rgba(76, 175, 80, 0.08);
            font-family: 'JetBrains Mono', Consolas, monospace;
            font-size: 0.92em;
        }

        .markdown-content pre {
            background: var(--bg-color);
            border-radius: 8px;
            padding: 15px;
            overflow-x: auto;
            margin: 0 0 1em;
            border: 1px solid var(--border-color);
        }

        .markdown-content pre code {
            padding: 0;
            background: transparent;
        }

        .markdown-content blockquote {
            margin: 0 0 1em;
            padding: 0.75em 1em;
            border-left: 4px solid var(--primary);
            background: rgba(76, 175, 80, 0.06);
            color: var(--text-secondary);
        }

        .markdown-content hr {
            border: none;
            border-top: 1px solid var(--border-color);
            margin: 1.5em 0;
        }

        .markdown-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 0 0 1em;
            display: block;
            overflow-x: auto;
        }

        .markdown-content th,
        .markdown-content td {
            border: 1px solid var(--border-color);
            padding: 0.6em 0.75em;
            text-align: left;
            vertical-align: top;
            white-space: nowrap;
        }

        .markdown-content th {
            background: rgba(0, 0, 0, 0.04);
            font-weight: 600;
        }

        .markdown-content a {
            color: var(--primary);
            text-decoration: underline;
            text-underline-offset: 2px;
        }

        .markdown-content img {
            max-width: 100%;
            border-radius: 10px;
        }

        .markdown-content > :first-child {
            margin-top: 0;
        }

        /* Code Playground Section */
        .playground-section {
            width: 500px;
            background-color: var(--card-bg);
            border-left: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .playground-header {
            padding: 10px 15px;
            background-color: rgba(0, 0, 0, 0.05);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .playground-header .title {
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .run-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            transition: background 0.2s;
        }

        .run-btn:hover {
            background-color: var(--primary-hover);
        }

        .run-btn:disabled {
            background-color: #999;
            cursor: not-allowed;
        }

        .editor-container {
            flex: 1 1 50%;
            height: 50%;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .CodeMirror {
            height: 100% !important;
            font-family: 'JetBrains Mono', 'Fira Code', Consolas, monospace;
            font-size: 14px;
        }

        .console-container {
            flex: 1 1 50%;
            height: 50%;
            border-top: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            background-color: #1e1e1e;
            /* dark theme force for console */
        }

        .console-header {
            background-color: #2d2d2d;
            color: #ccc;
            padding: 6px 15px;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #111;
        }

        .console-output {
            flex: 1;
            padding: 15px;
            font-family: 'JetBrains Mono', Consolas, monospace;
            font-size: 13px;
            color: #fff;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .console-output.error {
            color: #f44336;
        }

        .empty-state {
            color: #777;
            font-style: italic;
        }

        /* Loader */
        .loader {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-secondary);
        }
    </style>
</head>

<body>
    <!-- Top Nav -->
    <header class="header">
        <a href="courses.html" class="back-nav">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                style="margin-right:8px;">
                <path d="M19 12H5M12 19l-7-7 7-7" />
            </svg>
            返回课程主页
        </a>
        <div class="course-title" id="top-course-title">...</div>
    </header>

    <!-- Workspace -->
    <div class="workspace">

        <!-- Chapter Directory -->
        <aside class="left-menu" id="course-directory">
            <div style="padding: 20px; text-align: center; color: var(--text-secondary); font-size: 14px;">
                正在加载目录...
            </div>
        </aside>

        <!-- Markdown Lesson Content -->
        <main class="main-content" id="lesson-content">
            <div class="loader">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-dasharray="15" stroke-dashoffset="15" class="animate-spin"
                    style="margin-bottom: 15px; animation: spin 2s linear infinite;">
                    <circle cx="12" cy="12" r="10" />
                </svg>
                <style>
                    @keyframes spin {
                        100% {
                            transform: rotate(360deg);
                        }
                    }
                </style>
                <p>正在读取核心教案...</p>
            </div>
        </main>

        <!-- Python Code Playground -->
        <aside class="playground-section" id="code-playground" style="display: none;">
            <div class="playground-header">
                <div class="title">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4" />
                    </svg>
                    代码实验室
                </div>
                <button class="run-btn" id="run-code-btn">▶ 运行代码</button>
            </div>

            <div class="editor-container">
                <textarea id="code-editor"></textarea>
            </div>

            <div class="console-container">
                <div class="console-header">
                    <span>终端输出 (Output)</span>
                    <span id="run-status" style="display:none; color: #4CAF50;">运行成功</span>
                </div>
                <div class="console-output" id="console-output">
                    <span class="empty-state">等待执行代码...</span>
                </div>
            </div>
        </aside>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.7/dist/purify.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/python/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/clike/clike.min.js"></script>
    <script src="js/user.js?v=4"></script>
    <script src="js/learning.js"></script>
</body>

</html>
