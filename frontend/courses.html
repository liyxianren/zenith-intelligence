<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenith Intelligence (极智学习) - 课程</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/mobile.css">
    <style>
        .courses-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .courses-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .courses-title {
            font-size: 28px;
            font-weight: bold;
            color: #333;
        }

        .filter-box {
            display: flex;
            gap: 15px;
        }

        .filter-select {
            padding: 8px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }

        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .course-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }

        .course-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }

        .course-cover {
            width: 100%;
            height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 48px;
        }

        .cover-python {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }

        .cover-c {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .cover-vibe {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .cover-default {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .course-content {
            padding: 20px;
        }

        .course-name {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
        }

        .course-description {
            font-size: 14px;
            color: #666;
            margin-bottom: 15px;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .course-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }

        .course-stats {
            display: flex;
            gap: 15px;
            font-size: 13px;
            color: #888;
        }

        .course-stat {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .course-difficulty {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .difficulty-1 {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .difficulty-2 {
            background: #fff3e0;
            color: #ef6c00;
        }

        .difficulty-3 {
            background: #ffebee;
            color: #c62828;
        }

        body.modal-open {
            overflow: hidden;
        }

        .course-detail {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: rgba(15, 23, 42, 0.48);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transition: opacity 0.28s ease, visibility 0.28s ease;
        }

        .course-detail.show {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }

        .course-detail-content {
            --detail-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --detail-accent: #5b6bff;
            --detail-accent-soft: rgba(91, 107, 255, 0.16);
            --detail-button: linear-gradient(135deg, #4CAF50 0%, #2e7d32 100%);
            position: relative;
            width: min(920px, 100%);
            max-height: min(88vh, 920px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-radius: 28px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(248, 250, 252, 0.98));
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 32px 80px rgba(15, 23, 42, 0.28);
            transform: translateY(24px) scale(0.97);
            transition: transform 0.28s ease;
        }

        .course-detail.show .course-detail-content {
            transform: translateY(0) scale(1);
        }

        .detail-header {
            position: relative;
            padding: 26px 28px 30px;
            color: white;
            background: var(--detail-gradient);
            overflow: hidden;
        }

        .detail-header::before,
        .detail-header::after {
            content: '';
            position: absolute;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.14);
            pointer-events: none;
        }

        .detail-header::before {
            width: 220px;
            height: 220px;
            top: -110px;
            right: -40px;
        }

        .detail-header::after {
            width: 140px;
            height: 140px;
            bottom: -70px;
            left: -24px;
        }

        .detail-topbar,
        .detail-hero,
        .detail-info-grid {
            position: relative;
            z-index: 1;
        }

        .detail-topbar {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 24px;
        }

        .detail-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .detail-tag {
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.16);
            color: rgba(255, 255, 255, 0.96);
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.01em;
            backdrop-filter: blur(6px);
        }

        .detail-close {
            width: 40px;
            height: 40px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.18);
            border: 1px solid rgba(255, 255, 255, 0.22);
            color: white;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, background 0.2s;
            flex-shrink: 0;
        }

        .detail-close:hover {
            transform: rotate(90deg);
            background: rgba(255, 255, 255, 0.28);
        }

        .detail-hero {
            display: flex;
            gap: 20px;
            align-items: center;
            margin-bottom: 24px;
        }

        .detail-cover {
            width: 84px;
            height: 84px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.16);
            border: 1px solid rgba(255, 255, 255, 0.18);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.16);
            backdrop-filter: blur(10px);
            flex-shrink: 0;
        }

        .detail-title-wrap {
            flex: 1;
            min-width: 0;
        }

        .detail-title {
            font-size: clamp(28px, 4vw, 36px);
            font-weight: 800;
            line-height: 1.15;
            margin: 0 0 10px;
            color: white;
        }

        .detail-summary {
            margin: 0;
            max-width: 620px;
            font-size: 15px;
            line-height: 1.7;
            color: rgba(255, 255, 255, 0.88);
        }

        .detail-info-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 14px;
        }

        .detail-info-card {
            padding: 16px 18px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.14);
            border: 1px solid rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(8px);
        }

        .detail-info-label {
            display: block;
            margin-bottom: 6px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.72);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .detail-info-value {
            display: block;
            font-size: 18px;
            font-weight: 700;
            color: white;
        }

        .detail-body {
            padding: 28px 28px 0;
            overflow-y: auto;
        }

        .detail-section {
            margin-bottom: 22px;
            padding: 22px;
            border-radius: 22px;
            background: rgba(248, 250, 252, 0.9);
            border: 1px solid rgba(148, 163, 184, 0.14);
        }

        .detail-section-head {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 18px;
        }

        .detail-section-eyebrow {
            margin: 0 0 6px;
            color: #64748b;
            font-size: 12px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-weight: 700;
        }

        .detail-section-head h3 {
            margin: 0;
            font-size: 22px;
            color: #1f2937;
        }

        .detail-section-meta {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 8px 12px;
            border-radius: 999px;
            background: var(--detail-accent-soft);
            color: var(--detail-accent);
            font-size: 13px;
            font-weight: 700;
            white-space: nowrap;
        }

        .detail-description {
            margin: 0;
            color: #475569;
            line-height: 1.85;
            font-size: 15px;
        }

        .chapter-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .chapter-item {
            border: 1px solid rgba(148, 163, 184, 0.14);
            border-radius: 20px;
            background: white;
            overflow: hidden;
            transition: box-shadow 0.2s, border-color 0.2s, transform 0.2s;
        }

        .chapter-item:hover {
            border-color: rgba(91, 107, 255, 0.18);
            box-shadow: 0 14px 30px rgba(15, 23, 42, 0.06);
            transform: translateY(-1px);
        }

        .chapter-item.open {
            border-color: rgba(91, 107, 255, 0.22);
            box-shadow: 0 16px 34px rgba(15, 23, 42, 0.08);
        }

        .chapter-header {
            padding: 18px 20px;
            background: linear-gradient(180deg, rgba(248, 250, 252, 0.95), rgba(255, 255, 255, 0.95));
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
        }

        .chapter-header-main {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            min-width: 0;
        }

        .chapter-order {
            width: 36px;
            height: 36px;
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 13px;
            font-weight: 800;
            color: var(--detail-accent);
            background: var(--detail-accent-soft);
        }

        .chapter-name-wrap {
            min-width: 0;
        }

        .chapter-name {
            display: block;
            font-size: 16px;
            font-weight: 700;
            color: #0f172a;
        }

        .chapter-brief {
            display: block;
            margin-top: 4px;
            color: #64748b;
            font-size: 13px;
            line-height: 1.5;
        }

        .chapter-toggle {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 34px;
            height: 34px;
            border-radius: 12px;
            background: rgba(148, 163, 184, 0.12);
            color: #475569;
            font-size: 20px;
            transition: transform 0.24s ease, background 0.2s ease;
            flex-shrink: 0;
        }

        .chapter-item.open .chapter-toggle {
            transform: rotate(90deg);
            background: var(--detail-accent-soft);
            color: var(--detail-accent);
        }

        .chapter-lessons {
            padding: 0 20px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease, padding 0.3s ease;
        }

        .chapter-item.open .chapter-lessons {
            max-height: 560px;
            padding: 0 20px 18px;
        }

        .lesson-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 13px 14px;
            margin-top: 10px;
            border-radius: 14px;
            background: #f8fafc;
            border: 1px solid transparent;
            transition: background 0.2s, border-color 0.2s, transform 0.2s;
        }

        .lesson-item:hover {
            background: #eff6ff;
            border-color: rgba(91, 107, 255, 0.18);
            transform: translateX(2px);
        }

        .lesson-name {
            font-size: 14px;
            font-weight: 500;
            color: #1f2937;
        }

        .lesson-duration {
            font-size: 12px;
            color: #64748b;
            white-space: nowrap;
        }

        .detail-actions {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            padding: 20px 28px 28px;
            border-top: 1px solid rgba(148, 163, 184, 0.12);
            background: linear-gradient(180deg, rgba(255, 255, 255, 0), rgba(255, 255, 255, 0.92) 30%);
        }

        .detail-action-copy {
            min-width: 0;
        }

        .detail-action-copy strong {
            display: block;
            font-size: 16px;
            color: #111827;
            margin-bottom: 4px;
        }

        .detail-action-copy span {
            display: block;
            color: #64748b;
            font-size: 14px;
        }

        .start-btn {
            min-width: 180px;
            padding: 15px 22px;
            background: var(--detail-button);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 18px 30px rgba(46, 125, 50, 0.18);
            transition: transform 0.2s, box-shadow 0.2s, filter 0.2s;
        }

        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 22px 34px rgba(46, 125, 50, 0.24);
            filter: brightness(1.02);
        }

        @media (max-width: 768px) {
            .course-detail {
                padding: 12px;
            }

            .course-detail-content {
                border-radius: 24px;
                max-height: calc(100vh - 24px);
            }

            .detail-header,
            .detail-body,
            .detail-actions {
                padding-left: 20px;
                padding-right: 20px;
            }

            .detail-header {
                padding-top: 20px;
                padding-bottom: 22px;
            }

            .detail-hero {
                flex-direction: column;
                align-items: flex-start;
            }

            .detail-cover {
                width: 72px;
                height: 72px;
                font-size: 36px;
                border-radius: 20px;
            }

            .detail-info-grid {
                grid-template-columns: 1fr;
            }

            .detail-section {
                padding: 18px;
                border-radius: 18px;
            }

            .detail-section-head {
                flex-direction: column;
                align-items: flex-start;
            }

            .chapter-header {
                padding: 16px;
            }

            .chapter-lessons {
                padding: 0 16px;
            }

            .chapter-item.open .chapter-lessons {
                padding: 0 16px 16px;
            }

            .detail-actions {
                flex-direction: column;
                align-items: stretch;
                padding-top: 16px;
                padding-bottom: 20px;
            }

            .start-btn {
                width: 100%;
            }
        }

        .nav-links {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .nav-link {
            padding: 10px 20px;
            text-decoration: none;
            color: #666;
            border-radius: 8px;
            transition: background 0.3s;
        }

        .nav-link:hover {
            background: #f5f5f5;
        }

        .nav-link.active {
            background: #4CAF50;
            color: white;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            margin-top: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #4CAF50;
            border-radius: 3px;
            transition: width 0.3s;
        }

        /* 修复暗色模式下文本白色的问题 */
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #121212;
                color: #e0e0e0;
            }

            .courses-title,
            .course-name,
            .detail-title {
                color: #e0e0e0;
            }

            .course-description,
            .course-stats,
            .detail-summary,
            .detail-description,
            .detail-action-copy span,
            .detail-section-eyebrow,
            .chapter-brief {
                color: #aaaaaa;
            }

            .course-card,
            .course-detail-content {
                background: #1e1e1e;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
            }

            .course-detail {
                background: rgba(2, 6, 23, 0.7);
            }

            .course-detail-content {
                background: linear-gradient(180deg, rgba(30, 41, 59, 0.98), rgba(15, 23, 42, 0.98));
                border-color: rgba(148, 163, 184, 0.12);
                box-shadow: 0 32px 80px rgba(0, 0, 0, 0.45);
            }

            .course-meta {
                border-top: 1px solid #333;
            }

            .detail-section {
                background: rgba(30, 41, 59, 0.72);
                border-color: rgba(148, 163, 184, 0.12);
            }

            .detail-section-head h3,
            .detail-action-copy strong,
            .chapter-name,
            .lesson-name {
                color: #f8fafc;
            }

            .detail-section-meta {
                background: rgba(255, 255, 255, 0.08);
            }

            .detail-info-card,
            .detail-tag,
            .detail-cover,
            .detail-close {
                background: rgba(255, 255, 255, 0.12);
                border-color: rgba(255, 255, 255, 0.12);
            }

            .chapter-header {
                background: linear-gradient(180deg, rgba(51, 65, 85, 0.88), rgba(30, 41, 59, 0.88));
            }

            .chapter-item {
                background: rgba(15, 23, 42, 0.78);
                border: 1px solid rgba(148, 163, 184, 0.14);
            }

            .lesson-item {
                background: rgba(51, 65, 85, 0.45);
            }

            .lesson-item:hover {
                background: rgba(59, 130, 246, 0.16);
            }

            .lesson-duration {
                color: #94a3b8;
            }

            .chapter-toggle {
                background: rgba(148, 163, 184, 0.12);
                color: #cbd5e1;
            }

            .detail-actions {
                border-top-color: rgba(148, 163, 184, 0.12);
                background: linear-gradient(180deg, rgba(15, 23, 42, 0), rgba(15, 23, 42, 0.92) 30%);
            }
        }
    </style>
</head>

<body>
    <div class="courses-container">
        <!-- 导航菜单 -->
        <nav class="nav-menu">
            <div class="nav-container">
                <a href="app.html" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

                </a>

        </nav>

        <div class="courses-header">
            <h1 class="courses-title">课程中心</h1>
            <div class="filter-box">
                <select class="filter-select" id="subject-filter">
                    <option value="">所有学科</option>
                    <option value="programming">编程</option>
                </select>
                <select class="filter-select" id="difficulty-filter">
                    <option value="">所有难度</option>
                    <option value="1">入门</option>
                    <option value="2">进阶</option>
                    <option value="3">高级</option>
                </select>
            </div>
        </div>

        <div class="courses-grid" id="courses-grid">
            <!-- 课程卡片将在这里动态生成 -->
        </div>
    </div>

    <div class="course-detail" id="course-detail">
        <div class="course-detail-content" id="course-detail-content">
            <div class="detail-header">
                <div class="detail-topbar">
                    <div class="detail-tags">
                        <span class="detail-tag" id="detail-subject">课程</span>
                        <span class="detail-tag" id="detail-level">入门</span>
                    </div>
                    <button class="detail-close" id="detail-close" aria-label="关闭课程详情">×</button>
                </div>
                <div class="detail-hero">
                    <div class="detail-cover" id="detail-cover">📖</div>
                    <div class="detail-title-wrap">
                        <h2 class="detail-title" id="detail-title">课程标题</h2>
                        <p class="detail-summary" id="detail-summary">课程概览</p>
                    </div>
                </div>
                <div class="detail-info-grid">
                    <div class="detail-info-card">
                        <span class="detail-info-label">讲师</span>
                        <strong class="detail-info-value" id="detail-instructor">AI 助手</strong>
                    </div>

                document.body.classList.remove('modal-open');
            },

            async showCourseDetail(courseId) {
                try {
                    // 尝试从 API 加载课程详情
                    const response = await UserManager.fetchApi(`/api/course/${courseId}`);
                    const result = await response.json();

                    if (result.success) {
                        this.currentCourse = result.data;
                        this.renderCourseDetail();
                        this.openCourseDetailModal();
                    } else {
                        // 如果 API 失败，使用本地数据
                        this.showLocalCourseDetail(courseId);
                    }
                } catch (error) {
                    console.error('加载课程详情失败:', error);
                    // 使用本地数据
                    this.showLocalCourseDetail(courseId);
                }
            },

            showLocalCourseDetail(courseId) {
                const course = this.courses.find(c => c.id === parseInt(courseId));
                if (course) {
                    this.currentCourse = course;
                    this.renderCourseDetail();
                    this.openCourseDetailModal();
                }
            },

            renderCourseDetail() {
                const course = this.currentCourse;
                const lessonCount = this.getLessonCount(course);
                const theme = this.getCourseTheme(course);
                const detailContent = document.getElementById('course-detail-content');

                detailContent.style.setProperty('--detail-gradient', theme.gradient);
                detailContent.style.setProperty('--detail-accent', theme.accent);
                detailContent.style.setProperty('--detail-accent-soft', theme.soft);
                detailContent.style.setProperty('--detail-button', theme.button);

                document.getElementById('detail-cover').textContent = course.coverIcon || theme.icon;
                document.getElementById('detail-subject').textContent = this.getSubjectText(course.subject);
                document.getElementById('detail-level').textContent = `${this.getDifficultyText(course.difficulty)}难度`;
                document.getElementById('detail-title').textContent = course.name;
                document.getElementById('detail-summary').textContent = `预计 ${course.duration || 0} 分钟完成，包含 ${course.chapterCount || 0} 个章节与 ${lessonCount} 个核心课时。`;
                document.getElementById('detail-instructor').textContent = course.instructor || '未知';
                document.getElementById('detail-duration').textContent = `${course.duration || 0} 分钟`;
                document.getElementById('detail-chapters').textContent = `${course.chapterCount || 0} 章节`;
                document.getElementById('detail-description').textContent = course.description || '暂无描述';
                document.getElementById('detail-lesson-total').textContent = `${lessonCount} 课时`;

                const chapterList = document.getElementById('chapter-list');
                if (course.chapters && course.chapters.length > 0) {
                    chapterList.innerHTML = course.chapters.map((chapter, index) => `
                        <div class="chapter-item ${index === 0 ? 'open' : ''}" data-id="${chapter.id}">
                            <div class="chapter-header">
                                <div class="chapter-header-main">
                                    <span class="chapter-order">${String(index + 1).padStart(2, '0')}</span>
                                    <div class="chapter-name-wrap">
                                        <span class="chapter-name">第${index + 1}章 · ${chapter.name}</span>
                                        <span class="chapter-brief">${chapter.description || `${(chapter.lessons && chapter.lessons.length) || chapter.lessonCount || 0} 个课时，建议按顺序完成`}</span>
                                    </div>
                                </div>
                                <span class="chapter-toggle">›</span>
                            </div>
                            <div class="chapter-lessons">
                                ${chapter.lessons ? chapter.lessons.map(lesson => `
                                    <div class="lesson-item" data-id="${lesson.id}">
                                        <span class="lesson-name">${lesson.name}</span>
                                        <span class="lesson-duration">${lesson.duration || 0} 分钟</span>
                                    </div>
                                `).join('') : '<p style="color: #999; padding: 10px;">暂无课时</p>'}
                            </div>
                        </div>
                    `).join('');
                } else {
                    chapterList.innerHTML = '<p style="color: #999; text-align: center; padding: 20px;">课程目录整理中，稍后会在这里展示完整章节。</p>';
                }
            },

            cacheCurrentCourse() {
                if (!this.currentCourse) return;

                try {
                    sessionStorage.setItem(this.cacheKey, JSON.stringify({
                        courseId: this.currentCourse.id,
                        cachedAt: Date.now(),
                        course: this.currentCourse
                    }));
                } catch (error) {
                    console.warn('缓存课程信息失败:', error);
                }
            },

            navigateToLearning() {
                if (!this.currentCourse) return;
                this.cacheCurrentCourse();
                window.location.href = `learning.html?course_id=${this.currentCourse.id}`;
            },

            async startCourse() {
                if (!this.currentCourse) return;

                if (!UserManager.isLoggedIn()) {
                    alert('请先登录才能开始学习课程！');
                    window.location.href = 'index.html';
                    return;
                }

                try {
                    // 尝试从 API 开始课程
                    const response = await UserManager.fetchApi(`/api/course/${this.currentCourse.id}/start`, {
                        method: 'POST'
                    });

                    if (response.status === 404) {
                        // 后端没有这门课，走本地处理
                        console.warn('后端课程不存在，使用本地课程数据开始学习');
                        this.startLocalCourse();
                        return;
                    }

                    const result = await response.json();

                    if (result.success) {
                        this.navigateToLearning();
                    } else {
                        // 如果 API 失败，使用本地处理
                        this.startLocalCourse();
                    }
                } catch (error) {
                    console.error('开始课程失败:', error);
                    // 使用本地处理
                    this.startLocalCourse();
                }
            },

            startLocalCourse() {
                if (!this.currentCourse) return;

                this.navigateToLearning();
            },

            bindEvents() {
                document.getElementById('courses-grid').addEventListener('click', (e) => {
                    const card = e.target.closest('.course-card');
                    if (card) {
                        this.showCourseDetail(parseInt(card.dataset.id));
                    }
                });

                document.getElementById('detail-close').addEventListener('click', () => {
                    this.closeCourseDetailModal();
                });

                document.getElementById('course-detail').addEventListener('click', (e) => {
                    if (e.target.id === 'course-detail') {
                        this.closeCourseDetailModal();
                    }
                });

                document.getElementById('start-course-btn').addEventListener('click', () => {
                    this.startCourse();
                });

                document.getElementById('chapter-list').addEventListener('click', (e) => {
                    const chapterItem = e.target.closest('.chapter-item');
                    if (chapterItem && e.target.closest('.chapter-header')) {
                        chapterItem.classList.toggle('open');
                    }
                });

                document.getElementById('subject-filter').addEventListener('change', () => {
                    this.filterCourses();
                });

                document.getElementById('difficulty-filter').addEventListener('change', () => {
                    this.filterCourses();
                });

                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape') {
                        this.closeCourseDetailModal();
                    }
                });
            },

            filterCourses() {
                const subject = document.getElementById('subject-filter').value;
                const difficulty = document.getElementById('difficulty-filter').value;

                let filtered = this.courses;

                if (subject) {
                    filtered = filtered.filter(c => c.subject === subject);
                }

                if (difficulty) {
                    filtered = filtered.filter(c => c.difficulty === parseInt(difficulty));
                }

                this.renderFilteredCourses(filtered);
            },

            renderFilteredCourses(courses) {
                const container = document.getElementById('courses-grid');

                if (courses.length === 0) {
                    container.innerHTML = '<p style="text-align: center; color: #999; padding: 40px; grid-column: 1/-1;">没有符合条件的课程</p>';
                    return;
                }

                container.innerHTML = courses.map(course => `
                    <div class="course-card" data-id="${course.id}">
                        <div class="course-cover ${course.coverClass || 'cover-default'}">${course.coverIcon || '📖'}</div>
                        <div class="course-content">
                            <div class="course-name">${course.name}</div>
                            <div class="course-description">${course.description || '暂无描述'}</div>
                            <div class="course-meta">
                                <div class="course-stats">
                                    <span class="course-stat">📚 ${course.chapterCount || 0} 章节</span>
                                    <span class="course-stat">⏱️ ${course.duration || 0} 分钟</span>
                                </div>
                                <span class="course-difficulty difficulty-${course.difficulty || 1}">
                                    ${this.getDifficultyText(course.difficulty)}
                                </span>
                            </div>
                        </div>
                    </div>
                `).join('');
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            CoursesApp.init();
        });
    </script>
</body>

</html>
